<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; img-src 'self';">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rewrite AI</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <div class="popup-header">
      <div class="popup-logo">✍️</div>
      <div>
        <h1>Rewrite AI</h1>
        <p class="tagline">Rewrite any selected text instantly using AI</p>
      </div>
    </div>

    <div class="popup-body">
      <div class="info-card">
        <div class="info-icon">1</div>
        <span>Select text on any webpage</span>
      </div>
      <div class="info-card">
        <div class="info-icon">2</div>
        <span>Right-click → "Rewrite with AI"</span>
      </div>
      <div class="info-card">
        <div class="info-icon">3</div>
        <span>Pick a suggestion to replace the text</span>
      </div>
    </div>

    <div class="popup-footer">
      <button id="open-settings-btn">⚙️ Settings</button>
      <div class="shortcut-hint">Shortcut: <kbd>Ctrl+Shift+R</kbd></div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
