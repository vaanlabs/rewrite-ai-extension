<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; img-src 'self';">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rewrite AI — Settings</title>
  <link rel="stylesheet" href="settings.css">
</head>
<body>
  <div class="settings-wrapper">
    <div class="settings-card">
      <div class="settings-header">
        <h1>⚙️ Rewrite AI</h1>
        <p>Configure your AI provider and preferences</p>
      </div>

      <form id="settings-form">
        <!-- Provider -->
        <div class="field-group">
          <label for="provider">AI Provider</label>
          <select id="provider">
            <option value="groq">Groq — free, no credit card (recommended)</option>
            <option value="gemini">Google Gemini (free tier)</option>
            <option value="openai">OpenAI (paid)</option>
          </select>
        </div>

        <!-- Groq API Key -->
        <div class="field-group" id="groq-key-group">
          <label for="groq-key">Groq API Key <span style="color:#10b981;font-weight:400;">(free at console.groq.com)</span></label>
          <input type="password" id="groq-key" placeholder="gsk_..." autocomplete="off">
        </div>

        <!-- OpenAI API Key -->
        <div class="field-group" id="openai-key-group">
          <label for="openai-key">OpenAI API Key</label>
          <input type="password" id="openai-key" placeholder="sk-..." autocomplete="off">
        </div>

        <!-- Gemini API Key -->
        <div class="field-group" id="gemini-key-group">
          <label for="gemini-key">Gemini API Key</label>
          <input type="password" id="gemini-key" placeholder="AI..." autocomplete="off">
        </div>

        <!-- Groq Model (free, open-source) -->
        <div class="field-group" id="groq-model-group">
          <label for="groq-model">Groq Model <span style="color:#10b981;font-weight:400;">(free, open-source)</span></label>
          <select id="groq-model">
            <option value="llama-3.3-70b-versatile">Llama 3.3 70B (best quality)</option>
            <option value="llama-3.1-8b-instant">Llama 3.1 8B (fastest)</option>
            <option value="gemma2-9b-it">Gemma 2 9B</option>
            <option value="mixtral-8x7b-32768">Mixtral 8x7B</option>
          </select>
        </div>

        <!-- OpenAI Model (paid) -->
        <div class="field-group" id="openai-model-group">
          <label for="openai-model">OpenAI Model <span style="color:#9ca3af;font-weight:400;">(paid)</span></label>
          <select id="openai-model">
            <option value="gpt-4o-mini">gpt-4o-mini</option>
            <option value="gpt-3.5-turbo">gpt-3.5-turbo</option>
          </select>
        </div>

        <!-- Gemini Model (free tier) -->
        <div class="field-group" id="gemini-model-group">
          <label for="gemini-model">Gemini Model <span style="color:#10b981;font-weight:400;">(free tier)</span></label>
          <select id="gemini-model">
            <option value="gemini-1.5-flash">gemini-1.5-flash</option>
            <option value="gemini-2.0-flash">gemini-2.0-flash</option>
            <option value="gemini-2.0-flash-lite">gemini-2.0-flash-lite</option>
            <option value="gemini-1.5-pro">gemini-1.5-pro</option>
          </select>
        </div>

        <!-- Rewrite Style -->
        <div class="field-group">
          <label for="rewrite-style">Rewrite Style</label>
          <select id="rewrite-style">
            <option value="Improve grammar">Improve grammar</option>
            <option value="Professional">Professional</option>
            <option value="Friendly">Friendly</option>
            <option value="Shorter">Shorter</option>
            <option value="Clearer">Clearer</option>
          </select>
        </div>

        <!-- Save -->
        <div class="actions">
          <button type="submit" id="save-btn">Save Settings</button>
          <span id="status-msg"></span>
        </div>
      </form>
    </div>
  </div>

  <script src="settings.js"></script>
</body>
</html>
